services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      NEW_BACKEND_HOST: 0.0.0.0
      NEW_BACKEND_PORT: 3001
      DATABASE_URL: file:../data/hackaton.sqlite
      SQLITE_DB_PATH: /app/data/hackaton.sqlite
    ports:
      - "3001:3001"
    volumes:
      - sqlite-data:/app/data
      - agent-logs:/app/logs
      - temp-storage:/app/temp
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "4173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite-data:
  agent-logs:
  temp-storage:
